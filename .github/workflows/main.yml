name: 🍡 Mochi Hosting 自动续期

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install deps
        run: |
          pip install -r requirements.txt
          # GHA 推荐只用 refresh_token，一般不需要浏览器；有打码密钥时也不需要 playwright 浏览器
          # 如要用 Playwright 兜底可取消下一行注释：
          # python -m playwright install chromium

      - name: Check secrets
        env:
          MOCHI_SESSION_TOKEN: ${{ secrets.MOCHI_SESSION_TOKEN }}
          MOCHI_ID_TOKEN: ${{ secrets.MOCHI_ID_TOKEN }}
          MOCHI_REFRESH_TOKEN: ${{ secrets.MOCHI_REFRESH_TOKEN }}
          MOCHI_EMAIL: ${{ secrets.MOCHI_EMAIL }}
          MOCHI_PASSWORD: ${{ secrets.MOCHI_PASSWORD }}
          CAPSOLVER_API_KEY: ${{ secrets.CAPSOLVER_API_KEY }}
          TWOCAPTCHA_API_KEY: ${{ secrets.TWOCAPTCHA_API_KEY }}
        run: |
          # 推荐：Better Auth session cookie → OIDC 换 JWT
          if [ -n "$MOCHI_SESSION_TOKEN" ]; then
            echo "OK: MOCHI_SESSION_TOKEN set (len=${#MOCHI_SESSION_TOKEN}) [recommended]"
            exit 0
          fi
          if [ -n "$MOCHI_ID_TOKEN" ]; then
            echo "WARN: 仅有 MOCHI_ID_TOKEN（会过期）。长期请配 MOCHI_SESSION_TOKEN"
            echo "OK: MOCHI_ID_TOKEN set (len=${#MOCHI_ID_TOKEN}) [temporary]"
            exit 0
          fi
          if [ -n "$MOCHI_REFRESH_TOKEN" ]; then
            echo "WARN: 仅有 MOCHI_REFRESH_TOKEN — Better Auth 刷新通常不返回 id_token JWT，Hosting API 会 401"
            echo "请改配 Cookie __Secure-better-auth.session_token → Secret MOCHI_SESSION_TOKEN"
            echo "OK: MOCHI_REFRESH_TOKEN set (len=${#MOCHI_REFRESH_TOKEN}) [insufficient alone]"
            exit 0
          fi
          if [ -n "$CAPSOLVER_API_KEY" ] || [ -n "$TWOCAPTCHA_API_KEY" ]; then
            if [ -n "$MOCHI_EMAIL" ] && [ -n "$MOCHI_PASSWORD" ]; then
              echo "OK: captcha solver + password"
              exit 0
            fi
          fi
          echo "需要至少一种认证方式（推荐顺序）:"
          echo "  1) MOCHI_SESSION_TOKEN = Cookie __Secure-better-auth.session_token 的值"
          echo "  2) MOCHI_ID_TOKEN = Network Bearer JWT（临时，会过期）"
          echo "  3) 打码 KEY + 邮箱密码"
          echo "  (MOCHI_REFRESH_TOKEN/oidc_rt 单独不够，刷新无 JWT)"
          exit 1

      - name: Run renew
        id: renew
        continue-on-error: true
        env:
          MOCHI_EMAIL: ${{ secrets.MOCHI_EMAIL }}
          MOCHI_PASSWORD: ${{ secrets.MOCHI_PASSWORD }}
          MOCHI_REFRESH_TOKEN: ${{ secrets.MOCHI_REFRESH_TOKEN }}
          MOCHI_ID_TOKEN: ${{ secrets.MOCHI_ID_TOKEN }}
          MOCHI_SESSION_TOKEN: ${{ secrets.MOCHI_SESSION_TOKEN }}
          MOCHI_SERVER_IDS: ${{ secrets.MOCHI_SERVER_IDS }}
          CAPSOLVER_API_KEY: ${{ secrets.CAPSOLVER_API_KEY }}
          TWOCAPTCHA_API_KEY: ${{ secrets.TWOCAPTCHA_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          USE_PLAYWRIGHT: 'false'
        run: python renew.py

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mochi-report-${{ github.run_id }}
          path: |
            report-notify.md
            refresh_token.local.txt
            mochi_*.png
          if-no-files-found: ignore
          retention-days: 7

      - name: Bump time.txt
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "$(date -u +'%Y-%m-%d %H:%M:%S UTC')" > time.txt
          git add time.txt
          if git diff --cached --quiet; then
            echo "no change"
          else
            git commit -m "chore: bump time.txt $(date -u +'%Y-%m-%d')"
            git push origin HEAD:main || true
          fi

      - name: Fail if renew failed
        if: steps.renew.outcome == 'failure'
        run: exit 1
